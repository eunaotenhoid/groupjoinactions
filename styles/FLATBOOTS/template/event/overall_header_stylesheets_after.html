<style>
{% for post in postrow %}
	{% if post.S_GROUP_POST_COLOR %}
		/* Aplicando diretamente no painel do FlatBoots para visual nativo */
		#p{{ post.POST_ID }} .panel.forum-answer {
			border-left: 5px solid #{{ post.GROUP_POST_COLOR }} !important;
			background: linear-gradient(90deg, rgba({{ post.GROUP_POST_COLOR_RGB }}, 0.08) 0%, rgba({{ post.GROUP_POST_COLOR_RGB }}, 0.01) 100%) !important;
			transition: all 0.3s ease;
			overflow: hidden !important;
			position: relative;
		}
		
		#p{{ post.POST_ID }} .panel.forum-answer:hover {
			background: linear-gradient(90deg, rgba({{ post.GROUP_POST_COLOR_RGB }}, 0.12) 0%, rgba({{ post.GROUP_POST_COLOR_RGB }}, 0.02) 100%) !important;
		}

		/* Ajuste para que o cabeçário do post no FlatBoots não oculte a cor */
		#p{{ post.POST_ID }} .panel.forum-answer .panel-heading,
		#p{{ post.POST_ID }} .panel.forum-answer .panel-body,
		#p{{ post.POST_ID }} .panel.forum-answer .panel-footer {
			background: transparent !important;
		}
	{% endif %}
{% endfor %}
</style>
